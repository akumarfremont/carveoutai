    // Algorithmic art: Flowing particle field
    function FlowCanvas({ className, seed = 42, opacity = 0.08 }) {
      const canvasRef = useRef(null);
      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext("2d");
        const w = canvas.width = canvas.offsetWidth * 2;
        const h = canvas.height = canvas.offsetHeight * 2;
        ctx.clearRect(0, 0, w, h);

        let s = seed;
        const rand = () => { s = (s * 16807 + 0) % 2147483647; return (s & 0x7fffffff) / 0x7fffffff; };

        const cols = 40, rows = 30;
        const field = [];
        for (let i = 0; i < cols * rows; i++) {
          const x = (i % cols) / cols;
          const y = Math.floor(i / cols) / rows;
          field.push(Math.sin(x * 6.28 + seed * 0.1) * Math.cos(y * 4 + seed * 0.05) * 3.14 + rand() * 0.5);
        }

        const getAngle = (px, py) => {
          const cx = Math.min(Math.floor(px / w * cols), cols - 1);
          const cy = Math.min(Math.floor(py / h * rows), rows - 1);
          return field[cy * cols + cx] || 0;
        };

        const particleCount = 200;
        const colors = ["99,102,241", "139,92,246", "79,70,229", "167,139,250"];
        ctx.globalAlpha = opacity;

        for (let p = 0; p < particleCount; p++) {
          let px = rand() * w;
          let py = rand() * h;
          const color = colors[Math.floor(rand() * colors.length)];
          ctx.strokeStyle = `rgba(${color}, 0.6)`;
          ctx.lineWidth = 1 + rand() * 2;
          ctx.beginPath();
          ctx.moveTo(px, py);

          for (let step = 0; step < 80; step++) {
            const angle = getAngle(px, py);
            px += Math.cos(angle) * 3;
            py += Math.sin(angle) * 3;
            if (px < 0 || px > w || py < 0 || py > h) break;
            ctx.lineTo(px, py);
          }
          ctx.stroke();
        }

        ctx.globalAlpha = 0.03;
        const dotSpacing = 40;
        for (let x = 0; x < w; x += dotSpacing) {
          for (let y = 0; y < h; y += dotSpacing) {
            ctx.fillStyle = `rgba(99,102,241,1)`;
            ctx.beginPath();
            ctx.arc(x, y, 1.5, 0, 6.28);
            ctx.fill();
          }
        }
      }, [seed, opacity]);

      return <canvas ref={canvasRef} className={className} style={{ width: "100%", height: "100%" }} />;
    }

    // Geometric pattern
    function GeoPattern({ className, seed = 1, color = "99,102,241" }) {
      const canvasRef = useRef(null);
      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext("2d");
        const w = canvas.width = canvas.offsetWidth * 2;
        const h = canvas.height = canvas.offsetHeight * 2;
        ctx.clearRect(0, 0, w, h);

        let s = seed;
        const rand = () => { s = (s * 16807 + 0) % 2147483647; return (s & 0x7fffffff) / 0x7fffffff; };

        ctx.globalAlpha = 0.04;
        for (let i = 0; i < 8; i++) {
          const cx = rand() * w;
          const cy = rand() * h;
          const r = 40 + rand() * 200;
          ctx.strokeStyle = `rgba(${color}, 0.5)`;
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.arc(cx, cy, r, rand() * 3.14, rand() * 3.14 + 2);
          ctx.stroke();
        }
        ctx.globalAlpha = 0.03;
        for (let i = 0; i < 15; i++) {
          ctx.strokeStyle = `rgba(${color}, 0.4)`;
          ctx.lineWidth = 0.5;
          ctx.beginPath();
          ctx.moveTo(rand() * w, rand() * h);
          ctx.lineTo(rand() * w, rand() * h);
          ctx.stroke();
        }
      }, [seed, color]);

      return <canvas ref={canvasRef} className={className} style={{ width: "100%", height: "100%" }} />;
    }

    // ═══════════════════════════════════════════════
    // RESEARCH PAGE
    // ═══════════════════════════════════════════════
    function ResearchPage() {
      const [scope, setScope] = useState("all_sources");
      const [firm, setFirm] = useState("");
      const [messages, setMessages] = useState([]);
      const [input, setInput] = useState("");
      const [loading, setLoading] = useState(false);
      const [sources, setSources] = useState([]);
      const [pipeline, setPipeline] = useState(null);
      const msgsRef = useRef(null);

      const scrollBottom = () => { if (msgsRef.current) msgsRef.current.scrollTop = msgsRef.current.scrollHeight; };

      const sendQuery = async () => {
        const q = input.trim();
        if (!q || loading) return;
        setInput("");
        setLoading(true);
        setSources([]);
        setPipeline({ stage: "synthesizing", scores: null });
        setMessages(prev => [...prev, { role: "user", text: q }]);

        let fullText = "";
        try {
          const res = await fetch(`${API_BASE}/api/synthesize`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ query: q, scope, firm: scope === "single_firm" ? firm : null, n_results: 8 }),
          });
          const reader = res.body.getReader();
          const decoder = new TextDecoder();
          let buffer = "";

          while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split("\n");
            buffer = lines.pop();

            for (const line of lines) {
              if (!line.startsWith("data: ")) continue;
              try {
                const p = JSON.parse(line.slice(6));
                if (p.type === "sources") {
                  setSources(p.results || []);
                } else if (p.type === "stage") {
                  setPipeline(prev => ({ ...prev, stage: p.stage, label: p.label, scores: p.verification || prev?.scores }));
                } else if (p.type === "text") {
                  fullText += p.text;
                  setMessages(prev => {
                    const next = [...prev];
                    const last = next[next.length - 1];
                    if (last?.role === "assistant") { next[next.length - 1] = { ...last, text: fullText }; }
                    else { next.push({ role: "assistant", text: fullText }); }
                    return next;
                  });
                  scrollBottom();
                } else if (p.type === "done") {
                  setPipeline(prev => ({ ...prev, stage: "done", verified: p.verified, score: p.score, refined: p.refined }));
                } else if (p.type === "error") {
                  setMessages(prev => [...prev, { role: "assistant", text: `**Error:** ${p.error}`, error: true }]);
                }
              } catch {}
            }
          }
        } catch (e) {
          setMessages(prev => [...prev, { role: "assistant", text: "**Connection issue** — Make sure the server is running on port 5111.", error: true }]);
        }
        setLoading(false);
      };

      useEffect(scrollBottom, [messages]);

      return (
        <div className="flex flex-1 overflow-hidden">
          <div className="flex-1 flex flex-col">
            <div className="px-8 py-3.5 border-b border-gray-100 flex items-center gap-4 bg-gray-50">
              <span className="text-xs font-bold text-gray-400 uppercase tracking-widest">Scope</span>
              <div className="flex gap-1.5">
                {SCOPE_OPTIONS.map(s => (
                  <button
                    key={s.key}
                    onClick={() => setScope(s.key)}
                    className={`px-3.5 py-1.5 rounded-lg text-sm font-medium transition-all duration-150 ${
                      scope === s.key
                        ? "bg-indigo-600 text-white shadow-sm"
                        : "text-gray-500 bg-white border border-gray-200 hover:border-indigo-200 hover:text-indigo-600"
                    }`}
                  >
                    {s.label}
                  </button>
                ))}
              </div>
              {scope === "single_firm" && (
                <select
                  value={firm}
                  onChange={e => setFirm(e.target.value)}
                  className="px-3 py-1.5 rounded-lg text-sm bg-white border border-indigo-200 text-indigo-700 outline-none font-medium"
                >
                  <option value="">Select firm...</option>
                  {["EY", "KPMG", "Grant Thornton", "Deloitte", "PwC"].map(f => (
                    <option key={f} value={f}>{f}</option>
                  ))}
                </select>
              )}
            </div>

            <div ref={msgsRef} className="flex-1 overflow-y-auto px-8 py-8 space-y-5 bg-white">
              {messages.length === 0 && (
                <div className="flex flex-col items-center justify-center h-full gap-5 py-12">
                  <div className="relative">
                    <div className="absolute inset-0 w-24 h-24 -m-4">
                      <GeoPattern className="absolute inset-0" seed={7} color="99,102,241" />
                    </div>
                    <div className="relative w-16 h-16 rounded-2xl bg-indigo-50 flex items-center justify-center border border-indigo-100">
                      <IconBookOpen className="w-8 h-8 text-indigo-600" />
                    </div>
                  </div>
                  <div className="text-center">
                    <h2 className="text-2xl font-bold text-gray-900 mb-2">Research Mode</h2>
                    <p className="text-gray-500 text-sm max-w-md leading-relaxed">
                      Ask any carveout accounting question. Answers synthesized by Claude, verified by GPT, with full source citations.
                    </p>
                  </div>
                  <div className="flex flex-wrap gap-2.5 justify-center max-w-2xl mt-2">
                    {SUGGESTIONS.map((s, i) => (
                      <button
                        key={i}
                        onClick={() => setInput(s)}
                        className="px-4 py-2 rounded-xl border border-gray-200 text-sm text-gray-500 hover:border-indigo-300 hover:text-indigo-700 hover:bg-indigo-50 transition-all duration-150 font-medium flex items-center gap-2"
                      >
                        <IconLightbulb className="w-3.5 h-3.5 text-amber-400" />
                        {s}
                      </button>
                    ))}
                  </div>
                </div>
              )}

              {messages.map((m, i) => (
                <div key={i} className={`flex gap-3 ${m.role === "user" ? "justify-end" : ""}`}>
                  {m.role === "assistant" && (
                    <div className="w-8 h-8 rounded-lg bg-indigo-50 flex items-center justify-center flex-shrink-0 border border-indigo-100 mt-0.5">
                      <IconBot className="w-4 h-4 text-indigo-600" />
                    </div>
                  )}
                  <div className={`max-w-2xl rounded-2xl px-5 py-3.5 text-sm leading-relaxed ${
                    m.role === "user"
                      ? "bg-indigo-600 text-white rounded-br-md shadow-md shadow-indigo-200"
                      : "bg-gray-50 border border-gray-200 rounded-bl-md text-gray-700"
                  }`}>
                    {m.role === "assistant" && pipeline?.stage === "done" && i === messages.length - 1 && (
                      <div className="flex items-center gap-2 mb-3 pb-3 border-b border-gray-200">
                        <IconCheckCircle className="w-4 h-4 text-emerald-500 flex-shrink-0" />
                        <span className="text-xs text-emerald-700 font-bold">Verified {pipeline.score}/10</span>
                        {pipeline.refined && <div className="text-xs text-amber-700 bg-amber-50 border border-amber-200 px-2 py-0.5 rounded">Refined</div>}
                        {!pipeline.refined && <div className="text-xs text-emerald-700 bg-emerald-50 border border-emerald-200 px-2 py-0.5 rounded">First-pass</div>}
                      </div>
                    )}
                    <div dangerouslySetInnerHTML={{ __html: renderText(m.text) }} />
                  </div>
                  {m.role === "user" && (
                    <div className="w-8 h-8 rounded-lg bg-gray-100 flex items-center justify-center flex-shrink-0 border border-gray-200 mt-0.5">
                      <IconUser className="w-4 h-4 text-gray-600" />
                    </div>
                  )}
                </div>
              ))}

              {loading && pipeline && pipeline.stage !== "done" && (
                <div className="flex gap-3">
                  <div className="w-8 h-8 rounded-lg bg-indigo-50 flex items-center justify-center flex-shrink-0 border border-indigo-100 mt-0.5">
                    <IconBot className="w-4 h-4 text-indigo-600" />
                  </div>
                  <PipelineIndicator pipeline={pipeline} />
                </div>
              )}
            </div>

            <div className="px-8 py-5 border-t border-gray-100 bg-white">
              <div className="flex items-center gap-2 bg-white rounded-2xl border border-gray-200 focus-within:border-indigo-400 focus-within:shadow-lg focus-within:shadow-indigo-100 transition-all duration-200 px-5 py-1">
                <input
                  className="flex-1 bg-transparent text-base py-3 outline-none text-gray-800 placeholder-gray-400 font-medium"
                  placeholder="Ask a carveout question..."
                  value={input}
                  onChange={e => setInput(e.target.value)}
                  onKeyDown={e => e.key === "Enter" && sendQuery()}
                  disabled={loading}
                />
                <button
                  onClick={sendQuery}
                  disabled={!input.trim() || loading}
                  className={`w-9 h-9 rounded-xl flex items-center justify-center transition-all duration-150 flex-shrink-0 ${
                    input.trim() && !loading ? "bg-indigo-600 text-white hover:bg-indigo-700 shadow-sm" : "bg-gray-100 text-gray-400"
                  }`}
                >
                  {loading ? <IconLoader2 className="w-4 h-4 animate-spin" /> : <IconSend className="w-4 h-4" />}
                </button>
              </div>
            </div>
          </div>

          {sources.length > 0 && (
            <div className="w-80 border-l border-gray-100 overflow-y-auto p-5 space-y-3 bg-gray-50">
              <div className="flex items-center justify-between mb-3">
                <span className="text-xs font-bold text-gray-500 uppercase tracking-widest">Sources</span>
                <div className="bg-indigo-50 text-indigo-700 border border-indigo-200 text-xs font-semibold px-2 py-0.5 rounded">{sources.length}</div>
              </div>
              {(() => {
                const seen = {};
                sources.forEach(r => { if (!seen[r.source_file] || r.relevance > seen[r.source_file].relevance) seen[r.source_file] = r; });
                return Object.values(seen).sort((a, b) => b.relevance - a.relevance);
              })().map((s, i) => (
                <div key={i} className="bg-white rounded-xl border border-gray-200 p-4 hover:border-indigo-200 hover:shadow-sm transition-all duration-150 cursor-pointer">
                  <div className="flex items-start justify-between mb-2">
                    <span className="text-xs font-semibold leading-tight pr-2 text-gray-800">{s.title}</span>
                    <span className="text-xs font-bold text-emerald-600 bg-emerald-50 px-2 py-1 rounded-lg border border-emerald-100 flex-shrink-0">{s.relevance}%</span>
                  </div>
                  <div className="text-xs text-gray-400 mb-2 font-medium">{s.firm} · p.{s.page} · {s.year}</div>
                  <div className={`text-xs px-2 py-0.5 font-medium rounded border w-fit ${
                    s.category === "big4" ? "bg-blue-50 text-blue-600 border-blue-200" :
                    s.category === "law_firm" ? "bg-amber-50 text-amber-600 border-amber-200" :
                    s.category === "advisory" ? "bg-violet-50 text-violet-600 border-violet-200" :
                    "bg-gray-50 text-gray-500 border-gray-200"
                  }`}>
                    {s.category === "big4" ? "Big 4" : s.category === "law_firm" ? "Law Firm" : s.category === "advisory" ? "Advisory" : "Other"}
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

    function PipelineIndicator({ pipeline }) {
      const steps = [
        { key: "synthesizing", label: "Synthesizing", model: "Claude Sonnet", color: "indigo", done: ["synthesized","verifying","verified","refining","refined","passed","streaming","done"].includes(pipeline.stage) },
        { key: "verifying",    label: "Verifying",    model: "GPT-4o-mini",   color: "amber", done: ["verified","refining","refined","passed","streaming","done"].includes(pipeline.stage) },
        { key: "refining",     label: "Refining",     model: "GPT-4o",        color: "violet", done: ["refined","passed","streaming","done"].includes(pipeline.stage) },
      ];

      return (
        <div className="bg-white border border-gray-200 rounded-2xl px-5 py-4 min-w-80 shadow-sm">
          <div className="text-xs font-bold text-gray-400 uppercase tracking-widest mb-3">Verification Pipeline</div>
          <div className="space-y-1">
            {steps.map((s, i) => {
              const active = s.key === "synthesizing" ? ["synthesizing"].includes(pipeline.stage) :
                             s.key === "verifying" ? ["verifying"].includes(pipeline.stage) :
                             ["refining"].includes(pipeline.stage);
              return (
                <div key={i}>
                  <div className={`flex items-center gap-3 py-2 px-3 rounded-lg text-xs font-medium transition-all duration-200 ${
                    s.done ? "bg-emerald-50 text-emerald-700" : active ? "bg-indigo-50 text-indigo-700" : "text-gray-400"
                  }`}>
                    <div className="flex-shrink-0">
                      {s.done ? (
                        <IconCheckCircle className="w-4 h-4 text-emerald-500" />
                      ) : active ? (
                        <IconLoader2 className="w-4 h-4 animate-spin text-indigo-600" />
                      ) : (
                        <IconCircle className="w-4 h-4 text-gray-300" />
                      )}
                    </div>
                    <span className="font-semibold">{s.label}</span>
                    <span className="text-gray-400 text-xs ml-auto font-medium">{s.model}</span>
                    {s.done && pipeline.scores && s.key === "verifying" && (
                      <div className="text-xs text-emerald-700 bg-emerald-50 border border-emerald-200 px-2 py-0.5 rounded ml-1">
                        {pipeline.scores.score}/10
                      </div>
                    )}
                  </div>
                  {i < steps.length - 1 && (
                    <div className="flex justify-start pl-5">
                      <div className={`w-px h-3 ${s.done ? "bg-emerald-300" : "bg-gray-200"}`} />
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════
    // DEBATE PAGE
    // ═══════════════════════════════════════════════
    function DebatePage() {
      const [view, setView] = useState("formats");
      const [format, setFormat] = useState(null);
      const [selected, setSelected] = useState([]);
      const [debatePhase, setDebatePhase] = useState(0);
      const [positions, setPositions] = useState({});
      const [topic, setTopic] = useState("A parent company allocates $50M in corporate G&A using headcount as the sole basis. Is this defensible, and what approach would better reflect standalone economics?");
      const [history, setHistory] = useState([]);
      const [debateInput, setDebateInput] = useState("");
      const [loading, setLoading] = useState(false);
      const chatRef = useRef(null);

      const scrollChat = () => { if (chatRef.current) chatRef.current.scrollTop = chatRef.current.scrollHeight; };
      const reset = () => { setView("formats"); setFormat(null); setSelected([]); setDebatePhase(0); setPositions({}); setHistory([]); };

      const stream1v1 = async (userMsg, topicOverride) => {
        setLoading(true);
        let fullText = "";
        try {
          const res = await fetch(`${API_BASE}/api/debate/1v1`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ topic: topicOverride || topic, message: userMsg || "", history }),
          });
          const reader = res.body.getReader();
          const decoder = new TextDecoder();
          let buffer = "";
          while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split("\n");
            buffer = lines.pop();
            for (const line of lines) {
              if (!line.startsWith("data: ")) continue;
              try {
                const p = JSON.parse(line.slice(6));
                if (p.type === "text") {
                  fullText += p.text;
                  setHistory(prev => {
                    const next = [...prev];
                    const last = next[next.length - 1];
                    if (last?.role === "assistant") { next[next.length - 1] = { ...last, text: fullText }; }
                    else { next.push({ role: "assistant", text: fullText }); }
                    return next;
                  });
                  scrollChat();
                }
              } catch {}
            }
          }
        } catch {
          setHistory(prev => [...prev, { role: "assistant", text: "**Connection error** — server not reachable." }]);
        }
        setLoading(false);
      };

      const start1v1 = () => { setView("1v1"); setHistory([]); stream1v1(null, "carve-out cost allocation methodology and its defensibility"); };
      const send1v1 = () => {
        const q = debateInput.trim();
        if (!q || loading) return;
        setDebateInput("");
        setHistory(prev => [...prev, { role: "user", text: q }]);
        stream1v1(q, null);
      };

      const advancePhase = async () => {
        if (debatePhase > 4 || loading) return;
        const newPhase = debatePhase + 1;
        setDebatePhase(newPhase);
        setLoading(true);
        const phaseKey = PHASE_KEYS[newPhase - 1];
        const prevPositions = {};
        for (const key of PHASE_KEYS) { if (positions[key]) Object.assign(prevPositions, positions[key]); }
        setPositions(prev => ({ ...prev, [phaseKey]: Object.fromEntries(selected.map(id => [id, "__loading__"])) }));

        try {
          const res = await fetch(`${API_BASE}/api/debate/multi`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ topic, personas: selected, phase: phaseKey, previous_positions: prevPositions }),
          });
          const reader = res.body.getReader();
          const decoder = new TextDecoder();
          let buffer = "";
          while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split("\n");
            buffer = lines.pop();
            for (const line of lines) {
              if (!line.startsWith("data: ")) continue;
              try {
                const p = JSON.parse(line.slice(6));
                if (p.type === "persona_done") {
                  setPositions(prev => ({ ...prev, [phaseKey]: { ...(prev[phaseKey] || {}), [p.persona]: p.text } }));
                }
              } catch {}
            }
          }
        } catch {
          setPositions(prev => ({ ...prev, [phaseKey]: Object.fromEntries(selected.map(id => [id, "**Connection error**"])) }));
        }
        setLoading(false);
      };

      const getLatest = (pid) => {
        for (let i = PHASE_KEYS.length - 1; i >= 0; i--) {
          if (positions[PHASE_KEYS[i]]?.[pid] && positions[PHASE_KEYS[i]][pid] !== "__loading__") return positions[PHASE_KEYS[i]][pid];
        }
        return null;
      };

      const isLoadingPersona = (pid) => {
        const phaseKey = PHASE_KEYS[debatePhase - 1];
        return positions[phaseKey]?.[pid] === "__loading__";
      };

      const togglePersona = (id, max) => {
        setSelected(prev => {
          if (prev.includes(id)) return prev.filter(p => p !== id);
          if (prev.length >= max) return prev;
          return [...prev, id];
        });
      };

      // Format Selection
      if (view === "formats") {
        return (
          <div className="flex-1 overflow-y-auto">
            <div className="relative overflow-hidden bg-gradient-to-br from-violet-50 via-white to-indigo-50 border-b border-gray-100">
              <div className="absolute inset-0">
                <FlowCanvas className="absolute inset-0" seed={88} opacity={0.05} />
              </div>
              <div className="relative z-10 text-center px-12 py-14">
                <h1 className="text-3xl font-bold tracking-tight text-gray-900 mb-2">Debate Mode</h1>
                <p className="text-gray-500 text-base">Choose your format to test carveout defensibility</p>
              </div>
            </div>

            <div className="px-12 py-8 max-w-4xl mx-auto">
              <div className="grid grid-cols-2 gap-5">
                {[
                  { fmt: "1v1", num: "1v1", sub: "Cross-Examination", desc: "You challenge the Auditor in real-time. Test whether allocations survive scrutiny.", bg: "bg-blue-50", border: "border-blue-200", accent: "text-blue-600", hoverBorder: "hover:border-blue-300" },
                  { fmt: "2", num: "2", sub: "Point-Counterpoint", desc: "Pick two personas for structured argument and rebuttal.", bg: "bg-emerald-50", border: "border-emerald-200", accent: "text-emerald-600", hoverBorder: "hover:border-emerald-300" },
                  { fmt: "3", num: "3", sub: "Panel Discussion", desc: "Three perspectives with moderated cross-challenges.", bg: "bg-amber-50", border: "border-amber-200", accent: "text-amber-600", hoverBorder: "hover:border-amber-300" },
                  { fmt: "4", num: "4", sub: "Full Panel", desc: "All 4 personas — opening, challenge, convergence, synthesis.", bg: "bg-violet-50", border: "border-violet-200", accent: "text-violet-600", hoverBorder: "hover:border-violet-300" },
                ].map(f => (
                  <div
                    key={f.fmt}
                    className={`relative overflow-hidden rounded-2xl border ${f.border} bg-white p-7 cursor-pointer group hover:shadow-lg ${f.hoverBorder} transition-all duration-300`}
                    onClick={() => { setFormat(f.fmt); setSelected(f.fmt === "1v1" ? ["auditor"] : []); setView("setup"); }}
                  >
                    <div className="absolute top-0 right-0 w-20 h-20">
                      <GeoPattern className="absolute inset-0" seed={parseInt(f.fmt) || 99} color={f.accent.includes("blue") ? "59,130,246" : f.accent.includes("emerald") ? "16,185,129" : f.accent.includes("amber") ? "245,158,11" : "139,92,246"} />
                    </div>
                    <div className="relative z-10">
                      <div className={`text-3xl font-bold mb-2 ${f.accent}`}>{f.num}</div>
                      <div className="text-base font-bold text-gray-900 mb-1">{f.sub}</div>
                      <div className="text-sm text-gray-500 leading-relaxed">{f.desc}</div>
                      <span className={`mt-4 flex items-center gap-1 text-sm font-semibold ${f.accent} opacity-0 group-hover:opacity-100 transition-opacity`}>
                        Start <IconArrowRight className="w-4 h-4" />
                      </span>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        );
      }

      // Setup
      if (view === "setup") {
        const max = format === "1v1" ? 1 : parseInt(format);
        return (
          <div className="flex-1 overflow-y-auto px-12 py-8">
            <div className="max-w-2xl mx-auto">
              <button onClick={reset} className="flex items-center gap-2 text-sm text-gray-400 hover:text-gray-700 mb-8 transition-colors font-medium group">
                <IconArrowLeft className="w-4 h-4 group-hover:-translate-x-0.5 transition-transform" /> Back to formats
              </button>

              {format === "1v1" ? (
                <>
                  <div className="mb-8">
                    <h2 className="text-2xl font-bold text-gray-900 mb-2">1v1 Cross-Examination</h2>
                    <p className="text-gray-500 text-sm leading-relaxed">You'll cross-examine the Auditor. Challenge their positions and test their reasoning.</p>
                  </div>
                  <div className="bg-blue-50 rounded-2xl border border-blue-200 p-6 flex items-center gap-5 mb-6">
                    <div className="w-12 h-12 rounded-xl bg-white flex items-center justify-center border border-blue-200 shadow-sm">
                      <IconClipboardCheck className="w-6 h-6 text-blue-600" />
                    </div>
                    <div className="flex-1">
                      <div className="text-base font-bold text-gray-900">Auditor</div>
                      <div className="text-sm text-gray-500 mt-0.5">Defends with GAAP citations and audit methodology</div>
                    </div>
                    <div className="bg-white text-blue-600 border border-blue-200 text-xs font-bold px-3 py-1.5 rounded">Your opponent</div>
                  </div>
                  <button onClick={start1v1} className="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 text-sm rounded-xl shadow-sm transition-all flex items-center justify-center gap-2">
                    Start Cross-Examination <IconArrowRight className="w-4 h-4" />
                  </button>
                </>
              ) : (
                <>
                  <div className="mb-6">
                    <h2 className="text-2xl font-bold text-gray-900 mb-1">Select {max} Personas</h2>
                    <p className="text-gray-500 text-sm">{selected.length}/{max} selected</p>
                  </div>
                  <div className="space-y-2.5 mb-6">
                    {Object.entries(PERSONAS).map(([id, p]) => {
                      const sel = selected.includes(id);
                      const dis = !sel && selected.length >= max;
                      const Icon = getIcon(p.icon);
                      return (
                        <div
                          key={id}
                          onClick={() => !dis && togglePersona(id, max)}
                          className={`rounded-xl border p-4 flex items-center gap-4 cursor-pointer transition-all duration-150 ${
                            sel ? `${p.accentBg} ${p.accentBorder} border-2 shadow-sm` : dis ? "bg-gray-50 border-gray-100 opacity-40" : "bg-white border-gray-200 hover:border-gray-300 hover:shadow-sm"
                          }`}
                        >
                          <div className={`w-10 h-10 rounded-lg ${p.accentBg} flex items-center justify-center border ${p.accentBorder}`}>
                            <Icon className={`w-5 h-5 ${p.accent}`} />
                          </div>
                          <div className="flex-1">
                            <div className="text-sm font-bold text-gray-900">{p.name}</div>
                            <div className="text-xs text-gray-400 mt-0.5">Powered by {p.model}</div>
                          </div>
                          <div className={`w-5 h-5 rounded-md border-2 flex items-center justify-center transition-all ${
                            sel ? `${p.accentBorder} ${p.accentBg}` : "border-gray-300"
                          }`}>
                            {sel && <IconCheckCircle className={`w-3.5 h-3.5 ${p.accent}`} />}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                  <button
                    onClick={() => { setView("multi"); setDebatePhase(0); }}
                    disabled={selected.length < 2}
                    className={`w-full py-3 font-bold text-sm rounded-xl transition-all flex items-center justify-center gap-2 ${selected.length >= 2 ? "bg-indigo-600 hover:bg-indigo-700 text-white shadow-sm" : "bg-gray-100 text-gray-400 cursor-not-allowed"}`}
                  >
                    Start Debate {selected.length >= 2 && <IconArrowRight className="w-4 h-4" />}
                  </button>
                </>
              )}
            </div>
          </div>
        );
      }

      // 1v1 Chat
      if (view === "1v1") {
        return (
          <div className="flex-1 flex flex-col">
            <div className="px-8 py-3.5 border-b border-gray-100 flex items-center gap-4 bg-gray-50">
              <button onClick={reset} className="text-gray-400 hover:text-gray-700 transition-colors p-1 hover:bg-white rounded-lg"><IconArrowLeft className="w-5 h-5" /></button>
              <div className="bg-blue-50 text-blue-700 border border-blue-200 text-xs font-bold px-3 py-1 rounded">1v1 Cross-Examination</div>
              <span className="text-sm text-gray-400 font-medium">You vs. Auditor (Claude Sonnet)</span>
            </div>

            <div ref={chatRef} className="flex-1 overflow-y-auto px-8 py-6 space-y-5 bg-white">
              {history.map((m, i) => (
                <div key={i} className={`flex gap-3 ${m.role === "user" ? "justify-end" : ""}`}>
                  {m.role === "assistant" && (
                    <div className="w-8 h-8 rounded-lg bg-blue-50 flex items-center justify-center flex-shrink-0 border border-blue-200 mt-0.5">
                      <IconClipboardCheck className="w-4 h-4 text-blue-600" />
                    </div>
                  )}
                  <div className={`max-w-2xl rounded-2xl px-5 py-3.5 text-sm leading-relaxed ${
                    m.role === "user" ? "bg-indigo-600 text-white rounded-br-md shadow-md shadow-indigo-200" : "bg-gray-50 border border-gray-200 rounded-bl-md text-gray-700"
                  }`}>
                    {m.role === "assistant" && <div className="text-xs font-bold text-blue-600 mb-2 uppercase tracking-wider">Auditor</div>}
                    <div dangerouslySetInnerHTML={{ __html: renderText(m.text) }} />
                  </div>
                  {m.role === "user" && (
                    <div className="w-8 h-8 rounded-lg bg-gray-100 flex items-center justify-center flex-shrink-0 border border-gray-200 mt-0.5">
                      <IconUser className="w-4 h-4 text-gray-600" />
                    </div>
                  )}
                </div>
              ))}
              {loading && history[history.length - 1]?.role !== "assistant" && (
                <div className="flex gap-3">
                  <div className="w-8 h-8 rounded-lg bg-blue-50 flex items-center justify-center flex-shrink-0 border border-blue-200">
                    <IconClipboardCheck className="w-4 h-4 text-blue-600" />
                  </div>
                  <div className="bg-gray-50 border border-gray-200 rounded-2xl px-5 py-4">
                    <IconLoader2 className="w-5 h-5 text-blue-600 animate-spin" />
                  </div>
                </div>
              )}
            </div>

            <div className="px-8 py-5 border-t border-gray-100 bg-white">
              <div className="flex items-center gap-2 bg-white rounded-2xl border border-gray-200 focus-within:border-blue-400 focus-within:shadow-lg focus-within:shadow-blue-50 transition-all duration-200 px-5 py-1">
                <input
                  className="flex-1 bg-transparent text-base py-3 outline-none text-gray-800 placeholder-gray-400 font-medium"
                  placeholder="Challenge the Auditor's position..."
                  value={debateInput}
                  onChange={e => setDebateInput(e.target.value)}
                  onKeyDown={e => e.key === "Enter" && send1v1()}
                  disabled={loading}
                />
                <button
                  onClick={send1v1}
                  disabled={!debateInput.trim() || loading}
                  className={`w-9 h-9 rounded-xl flex items-center justify-center transition-all duration-150 flex-shrink-0 ${
                    debateInput.trim() && !loading ? "bg-indigo-600 text-white hover:bg-indigo-700 shadow-sm" : "bg-gray-100 text-gray-400"
                  }`}
                >
                  <IconSend className="w-4 h-4" />
                </button>
              </div>
            </div>
          </div>
        );
      }

      // Multi-persona
      if (view === "multi") {
        return (
          <div className="flex-1 flex flex-col bg-white">
            <div className="px-8 py-3.5 border-b border-gray-100 flex items-center gap-4 bg-gray-50">
              <button onClick={reset} className="text-gray-400 hover:text-gray-700 transition-colors p-1 hover:bg-white rounded-lg"><IconArrowLeft className="w-5 h-5" /></button>
              <div className="bg-violet-50 text-violet-700 border border-violet-200 text-xs font-bold px-3 py-1 rounded">{selected.length}-Persona Debate</div>
              <div className="flex gap-1.5 ml-auto">
                {PHASE_NAMES.map((name, i) => (
                  <span key={i} className={`px-2.5 py-1 rounded-lg text-xs font-semibold transition-all ${
                    i + 1 === debatePhase ? "bg-indigo-600 text-white shadow-sm" :
                    i + 1 < debatePhase ? "bg-emerald-50 text-emerald-700 border border-emerald-200" : "text-gray-400 bg-white border border-gray-200"
                  }`}>{name}</span>
                ))}
              </div>
            </div>

            <div className="px-8 py-4 border-b border-gray-100 bg-white">
              <div className="text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">Debate Topic</div>
              <div
                className="text-sm leading-relaxed text-gray-700 outline-none border-b-2 border-dashed border-gray-200 pb-2 focus:border-indigo-400 transition-colors"
                contentEditable
                suppressContentEditableWarning
                onBlur={e => setTopic(e.target.textContent)}
              >{topic}</div>
            </div>

            <div className="flex-1 overflow-y-auto p-6 grid grid-cols-2 gap-4">
              {selected.map(id => {
                const p = PERSONAS[id];
                const Icon = getIcon(p.icon);
                const content = getLatest(id);
                const isLoad = isLoadingPersona(id);
                return (
                  <div key={id} className={`rounded-2xl border border-gray-200 overflow-hidden flex flex-col bg-white hover:shadow-md transition-all`}>
                    <div className={`px-5 py-3.5 border-b border-gray-100 flex items-center gap-3 ${p.accentBg}`}>
                      <div className={`w-8 h-8 rounded-lg bg-white flex items-center justify-center border ${p.accentBorder} shadow-sm`}>
                        <Icon className={`w-4 h-4 ${p.accent}`} />
                      </div>
                      <div className="flex-1">
                        <span className="text-sm font-bold text-gray-900">{p.name}</span>
                        <span className="text-xs text-gray-400 ml-2">{p.model}</span>
                      </div>
                    </div>
                    <div className="p-5 text-sm leading-relaxed flex-1 overflow-y-auto">
                      {isLoad ? (
                        <div className="flex items-center gap-3 text-gray-400 py-8">
                          <IconLoader2 className="w-4 h-4 animate-spin flex-shrink-0" />
                          <span className="font-medium">Generating...</span>
                        </div>
                      ) : content ? (
                        <div dangerouslySetInnerHTML={{ __html: renderText(content) }} className="text-gray-600" />
                      ) : (
                        <span className="text-gray-400 italic">Waiting for phase to start...</span>
                      )}
                    </div>
                  </div>
                );
              })}
            </div>

            <div className="px-8 py-4 border-t border-gray-100 flex justify-center bg-gray-50">
              {debatePhase < 5 ? (
                <button
                  onClick={advancePhase}
                  disabled={loading}
                  className="bg-indigo-600 hover:bg-indigo-700 text-white font-bold px-8 py-2.5 text-sm rounded-xl shadow-sm transition-all disabled:opacity-50 disabled:cursor-not-allowed flex items-center gap-2"
                >
                  {loading && <IconLoader2 className="w-4 h-4 animate-spin" />}
                  {debatePhase === 0 ? "Generate Opening Positions" : `Advance to ${PHASE_NAMES[debatePhase]}`}
                  <IconChevronRight className="w-4 h-4" />
                </button>
              ) : (
                <div className="flex items-center gap-2 text-emerald-700 font-bold text-sm bg-emerald-50 border border-emerald-200 px-6 py-2.5 rounded-xl">
                  <IconCheckCircle className="w-5 h-5" /> Debate Complete
                </div>
              )}
            </div>
          </div>
        );
      }
    }

    // Render
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<CarveoutAI />);
  </script>
</body>
</html>
