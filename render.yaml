services:
  - type: web
    name: carveoutai
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 120 --workers 1
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: RATE_LIMIT_PER_HOUR
        value: "20"
      - key: PYTHON_VERSION
        value: "3.11.4"
